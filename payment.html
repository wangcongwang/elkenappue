<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f7fa;
            color: #111827;
            min-width: 100%;
            overflow-x: hidden;
            padding-bottom: 40px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 6px solid transparent;
            border-image: linear-gradient(45deg, #ff0033, #ff9900, #ffff00, #0066ff) 1;
            filter: blur(4px);
            animation: neonBreath 0.75s linear infinite alternate;
            z-index: 100000;
            pointer-events: none;
        }

        @keyframes neonBreath {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .status-bar {
            background-color: white;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }

        .order-header {
            background: linear-gradient(135deg, #059669 0%, #10b981 50%, #059669 100%);
            padding: 16px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            max-width: 100%;
            overflow: hidden;
        }

        .order-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            max-width: calc(100% - 40px);
        }

        .order-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 6px;
        }

        .order-name {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }

        .member-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            flex: 1;
            max-width: 100%;
        }

        .member-id-text {
            white-space: nowrap;
            flex-shrink: 0;
        }

        .order-details {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .close-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 16px;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin-left: 12px;
            position: relative;
            z-index: 10002;
        }

        .close-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .header {
            background-color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        .back-arrow {
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .payment-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 40px 20px;
        }

        .device-code-text {
            font-size: 24px;
            font-weight: 700;
            color: #374151;
            text-align: center;
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-container {
            background-color: white;
            border-radius: 24px;
            padding: 24px 24px 32px;
            width: 100%;
            max-width: 320px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: modal-appear 0.3s ease-out;
        }

        @keyframes modal-appear {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -56px auto 20px;
            font-size: 32px;
            color: white;
            box-shadow: 0 4px 16px rgba(5, 150, 105, 0.4);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            font-size: 24px;
            color: #9ca3af;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #111827;
            text-align: center;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .modal-content {
            font-size: 15px;
            color: #6b7280;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .modal-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>3:50</span>
        <div style="display: flex; gap: 4px; align-items: center;">
            <span>📶</span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="order-header">
        <div class="order-info">
            <div class="order-label">You are ordering for</div>
            <div class="order-name">
                <span class="member-name-text" id="memberName">Jonathan Doe De First/ Liew Second Name</span>
                <span class="member-id-text" id="memberId">| 100001234</span>
            </div>
            <div class="order-details" id="memberDetails">Platinum Rank | Membership expires on 2027-02-21</div>
        </div>
        <div class="close-btn" onclick="showExitModal()">×</div>
    </div>

    <!-- 退出确认弹窗 -->
    <div class="modal-overlay" id="exitModal">
        <div class="modal-container">
            <div class="modal-icon">🔔</div>
            <button class="modal-close" onclick="closeExitModal()">×</button>
            <div class="modal-title">Exit Order for Downline?</div>
            <div class="modal-content">Are you sure you want to leave this page? Your current progress may not be saved.</div>
            <button class="modal-btn" onclick="confirmExit()">Okay</button>
        </div>
    </div>

    <div class="header">
        <div class="back-arrow" onclick="window.location.href='order_detail.html'">←</div>
        <div class="header-title">Payment</div>
        <div style="width: 24px;"></div>
    </div>

    <!-- 支付内容 -->
    <div class="payment-container">
        <div class="device-code-text">非绑定设备码</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadMemberInfo();
        });

        function loadMemberInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const memberName = urlParams.get('name');
            const memberId = urlParams.get('id');
            
            if (memberName && memberId) {
                let name = decodeURIComponent(memberName);
                if (name.length > 20) {
                    name = name.substring(0, 20) + '...';
                }
                document.getElementById('memberName').textContent = name;
                document.getElementById('memberId').textContent = `| ${decodeURIComponent(memberId)}`;
            }
        }

        // 退出确认弹窗
        function showExitModal() {
            document.getElementById('exitModal').classList.add('active');
        }

        function closeExitModal() {
            document.getElementById('exitModal').classList.remove('active');
        }

        function confirmExit() {
            window.location.href = 'mall.html';
        }

        document.getElementById('exitModal').addEventListener('click', function(e) {
            if (e.target === this) closeExitModal();
        });
    </script>
</body>
</html>
